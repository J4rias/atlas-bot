services:
  consultant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.consultant
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy_net
    restart: unless-stopped

  manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.manager
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy_net
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: atlas_bot
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_bot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
  proxy_net:
    external: true
