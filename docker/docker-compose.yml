services:
  consultant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.consultant
    ports:
      - "3001:3001"
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.manager
    env_file: ../.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: atlas_bot
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atlas_dev}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas_bot"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
