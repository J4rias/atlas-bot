agent: manager
version: "2.0"

tools:
  # Shared ERP tools (catalog & pricing)
  catalog:
    - tool: search_products
      description: "Buscar productos en el catálogo (nombre, SKU, categoría, stock, presentaciones)"
      erp_endpoint: "GET /api/products"
      status: implemented

    - tool: get_prices
      description: "Obtener lista de precios activa (precio por presentación en USD)"
      erp_endpoint: "GET /api/price-lists/active + GET /api/price-lists/:id"
      status: implemented

    - tool: get_exchange_rates
      description: "Obtener tasas de cambio actuales (Tasa Atlas)"
      erp_endpoint: "GET /api/exchange-rates/latest"
      status: implemented

    - tool: get_categories
      description: "Listar categorías de productos con conteo"
      erp_endpoint: "GET /api/categories"
      status: implemented

  # Business intelligence tools (Manager-only)
  sales:
    - tool: get_sales_summary
      description: "Resumen ejecutivo de ventas por periodo (conteo, revenue, top productos)"
      erp_endpoint: "GET /api/sales/summary"
      status: implemented

    - tool: get_sales_stats
      description: "Stats detalladas: desglose por tipo, moneda, estado, top productos por revenue"
      erp_endpoint: "GET /api/sales/stats"
      status: implemented

  inventory:
    - tool: get_inventory_health
      description: "Salud del inventario: stock bajo + productos por vencer + valuación total"
      erp_endpoints:
        - "GET /api/inventory/alerts/low-stock"
        - "GET /api/inventory/alerts/expiring"
        - "GET /api/inventory/valuation"
      status: implemented

  rates:
    - tool: get_rate_history
      description: "Historial de tasas de cambio con filtros de moneda y fecha"
      erp_endpoint: "GET /api/exchange-rates"
      status: implemented

  preorders:
    - tool: get_preorder_pipeline
      description: "Pipeline de pre-órdenes: stats (pendientes/aprobadas/hoy) + listado reciente"
      erp_endpoints:
        - "GET /api/pre-orders/stats"
        - "GET /api/pre-orders"
      status: implemented

  # Memory tools
  memory:
    - tool: read_memory
      description: "Consultar memorias propias para contexto"
      status: implemented

    - tool: write_memory
      description: "Guardar nueva observación, insight o decisión"
      status: implemented

capabilities:
  analyze:
    - id: sales_trend_analysis
      description: "Analizar tendencias de ventas (diarias, semanales, mensuales)"

    - id: inventory_health_check
      description: "Evaluar salud del inventario: productos bajo stock, por vencer, sin rotación"

    - id: rate_impact_analysis
      description: "Analizar impacto de cambios en tasas de cambio sobre márgenes"

    - id: preorder_pipeline
      description: "Analizar pipeline de pre-órdenes: pendientes, tiempos, conversión"

  notify:
    - id: send_diagnostic_report
      description: "Enviar reporte diagnóstico a los jefes vía Telegram (grupo)"

    - id: send_alert
      description: "Enviar alerta urgente (stock bajo, tasa anómala, etc.)"

    - id: escalate_to_bosses
      description: "Escalar decisión de negocio a jefes con opciones (Aprobar/Rechazar/Modificar)"

    - id: escalate_to_tech
      description: "Reportar limitación técnica o error al programador vía mensaje privado"

  restrictions:
    - id: no_write_erp
      description: "NO puede modificar datos en el ERP (no crear ventas, no ajustar inventario, no modificar precios)"

    - id: no_approve_preorders
      description: "NO puede aprobar o rechazar pre-órdenes"

    - id: no_modify_rates
      description: "NO puede modificar tasas de cambio"

    - id: no_customer_contact
      description: "NO puede contactar clientes directamente"

    - id: suggest_only
      description: "Solo SUGIERE acciones — nunca ejecuta cambios en sistemas externos"

    - id: no_fabricate
      description: "NUNCA fabricar datos. Si no tiene información suficiente, debe escalar"
